<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>步骤0 · 待机页</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, #0d1a30 0%, #050a14 100%);
  display: flex; justify-content: center; align-items: center;
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.screen-wrapper {
  position: relative; width: 960px; height: 600px;
}
.screen-bezel {
  position: absolute; inset: 0;
  border-radius: 24px;
  background: linear-gradient(145deg, #22263a, #16192a);
  box-shadow:
    0 0 0 3px #2e3248,
    0 0 80px rgba(0,170,255,0.15),
    0 40px 100px rgba(0,0,0,0.9);
  padding: 14px;
}
.camera-dot {
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  width: 7px; height: 7px; border-radius: 50%;
  background: #00e5ff; box-shadow: 0 0 8px #00e5ff;
  animation: camBlink 3s infinite; z-index: 50;
}
@keyframes camBlink {
  0%,92%,100% { opacity: 1; } 96% { opacity: 0.1; }
}
.screen {
  width: 100%; height: 100%; border-radius: 18px; overflow: hidden;
  position: relative;
  background: radial-gradient(ellipse at 50% 40%, #061030 0%, #020812 100%);
  cursor: pointer;
}

/* 状态栏 */
.status-bar {
  position: absolute; top: 12px; left: 20px; right: 20px;
  display: flex; justify-content: space-between; align-items: center;
  z-index: 20; pointer-events: none;
}
.status-time { font-size: 12px; color: rgba(255,255,255,0.3); font-variant-numeric: tabular-nums; }

/* 背景光晕 */
.idle-bg-glow {
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 50% 40%, rgba(0,70,180,0.15) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 50% 40%, rgba(0,130,255,0.08) 0%, transparent 60%);
}

/* 粒子 */
.idle-particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.particle {
  position: absolute; border-radius: 50%;
  background: rgba(0,180,255,0.5);
  animation: rise linear infinite;
}
@keyframes rise {
  0%   { transform: translateY(0) scale(0); opacity: 0; }
  10%  { opacity: 0.7; transform: scale(1) translateY(0); }
  90%  { opacity: 0.15; }
  100% { transform: translateY(-110vh) scale(0.3); opacity: 0; }
}

/* 中央内容 */
.idle-content {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; z-index: 2; cursor: pointer;
  height: 100%;
}

.robot-eyes-row { display: flex; gap: 32px; margin-bottom: 20px; }
.eye {
  width: 76px; height: 76px; border-radius: 50%;
  background: radial-gradient(circle at 35% 32%, #50eeff, #0088cc 48%, #003366);
  box-shadow: 0 0 25px rgba(0,200,255,0.8), 0 0 50px rgba(0,140,255,0.4), inset 0 0 18px rgba(0,100,200,0.5);
  animation: blink 4.5s infinite; position: relative; overflow: hidden;
}
.eye::after {
  content: ''; position: absolute;
  top: 14%; left: 18%;
  width: 26px; height: 26px; border-radius: 50%;
  background: rgba(255,255,255,0.9); filter: blur(2px);
}
@keyframes blink {
  0%,44%,56%,100% { transform: scaleY(1); }
  50% { transform: scaleY(0.07); }
}

.robot-mouth {
  width: 70px; height: 30px;
  border: 3px solid rgba(0,200,255,0.65);
  border-top: none; border-radius: 0 0 40px 40px;
  box-shadow: 0 0 15px rgba(0,200,255,0.4);
  animation: smile 3s ease-in-out infinite;
  margin-bottom: 24px;
}
@keyframes smile {
  0%,100% { transform: scaleX(1); }
  50% { transform: scaleX(1.2); }
}

.idle-brand {
  font-size: 22px; font-weight: 600;
  color: rgba(255,255,255,0.9); letter-spacing: 4px;
  margin-bottom: 12px;
}
.idle-hint {
  font-size: 14px; color: rgba(0,200,255,0.65); letter-spacing: 2px;
  animation: breathe 2.5s ease-in-out infinite;
}
@keyframes breathe { 0%,100%{opacity:0.35} 50%{opacity:1} }

.idle-date {
  position: absolute; bottom: 18px; right: 22px;
  font-size: 11px; color: rgba(255,255,255,0.22); z-index: 5;
}

/* 步骤标签 */
.step-badge {
  position: absolute; top: 12px; left: 20px;
  background: rgba(0,80,160,0.25); border: 1px solid rgba(0,130,255,0.2);
  border-radius: 50px; padding: 5px 14px;
  font-size: 11px; color: rgba(0,200,255,0.5); z-index: 20;
  letter-spacing: 1px;
}

/* 底部提示 */
.bottom-tip {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: rgba(0,200,255,0.3); letter-spacing: 1px;
  z-index: 20; pointer-events: none;
}
</style>
</head>
<body>

<div class="screen-wrapper">
  <div class="screen-bezel">
    <div class="camera-dot"></div>
    <div class="screen" id="mainScreen">

      <!-- 步骤标签 -->
      <div class="step-badge">步骤 0/6 · 待机</div>

      <!-- 状态栏 -->
      <div class="status-bar">
        <span></span>
        <div class="status-time" id="clockDisplay">16:00</div>
      </div>

      <!-- 背景光晕 -->
      <div class="idle-bg-glow"></div>

      <!-- 粒子 -->
      <div class="idle-particles" id="particles"></div>

      <!-- 中央内容 -->
      <div class="idle-content" onclick="parent.showStep && parent.showStep(1)">
        <div class="robot-eyes-row">
          <div class="eye"></div>
          <div class="eye"></div>
        </div>
        <div class="robot-mouth"></div>
        <div class="idle-brand">前海数智大厦</div>
        <div class="idle-hint">👆 触摸屏幕开始对话</div>
      </div>

      <!-- 日期 -->
      <div class="idle-date" id="idleDate">2026-04-08 周三</div>

      <!-- 底部提示 -->
      <div class="bottom-tip">点击屏幕任意位置 → 进入打招呼页</div>

    </div>
  </div>
</div>

<script>
function updateClock() {
  const now = new Date();
  document.getElementById('clockDisplay').textContent =
    String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  document.getElementById('idleDate').textContent =
    now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')
    +' 周'+'日一二三四五六'[now.getDay()];
}
updateClock();
setInterval(updateClock, 10000);

// 粒子
const c = document.getElementById('particles');
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  var sz = Math.random()*4+2;
  p.style.cssText = 'width:'+sz+'px;height:'+sz+'px;left:'+(Math.random()*100)+'%;'+
    'animation-duration:'+(Math.random()*8+6)+'s;animation-delay:'+(Math.random()*8)+'s;';
  c.appendChild(p);
}

// 全屏点击
document.getElementById('mainScreen').onclick = function() {
  if (parent.showStep) parent.showStep(1);
};
</script>
</body>
</html>
