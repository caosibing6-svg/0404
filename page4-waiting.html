<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>步骤4 · 等待审批</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, #0d1a30 0%, #050a14 100%);
  display: flex; justify-content: center; align-items: center;
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.screen-wrapper { position: relative; width: 960px; height: 600px; }
.screen-bezel {
  position: absolute; inset: 0; border-radius: 24px;
  background: linear-gradient(145deg, #22263a, #16192a);
  box-shadow: 0 0 0 3px #2e3248, 0 0 80px rgba(0,170,255,0.15), 0 40px 100px rgba(0,0,0,0.9);
  padding: 14px;
}
.camera-dot {
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  width: 7px; height: 7px; border-radius: 50%; background: #00e5ff; box-shadow: 0 0 8px #00e5ff;
  animation: camBlink 3s infinite; z-index: 50;
}
@keyframes camBlink { 0%,92%,100%{opacity:1} 96%{opacity:0.1} }
.screen {
  width: 100%; height: 100%; border-radius: 18px; overflow: hidden; position: relative;
  background: linear-gradient(180deg, #111830 0%, #0a0e20 100%);
  display: flex; flex-direction: column;
}
.status-bar {
  position: absolute; top: 12px; left: 20px; right: 20px;
  display: flex; justify-content: space-between; align-items: center; z-index: 20;
}
.status-time { font-size: 12px; color: rgba(255,255,255,0.3); font-variant-numeric: tabular-nums; }
.step-badge {
  position: absolute; top: 12px; left: 20px;
  background: rgba(0,80,160,0.25); border: 1px solid rgba(0,130,255,0.2);
  border-radius: 50px; padding: 5px 14px;
  font-size: 11px; color: rgba(0,200,255,0.5); z-index: 20; letter-spacing: 1px;
}
.top-banner {
  background: rgba(0,100,200,0.12); border-bottom: 1px solid rgba(0,140,255,0.15);
  padding: 10px 20px; font-size: 12px; color: rgba(0,200,255,0.5);
  letter-spacing: 1px; text-align: center; margin-top: 36px;
}
.wait-area {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px; gap: 14px;
}
.phone-shake-wrap { position: relative; margin-bottom: 8px; }
.phone-icon {
  width: 70px; height: 120px; border: 2px solid rgba(0,150,255,0.35);
  border-radius: 16px; background: rgba(0,30,70,0.4);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 6px;
  animation: phoneShake 4s ease-in-out infinite;
}
@keyframes phoneShake {
  0%,100%{transform:translateX(0) rotate(0)}
  15%{transform:translateX(-4px) rotate(-2deg)}
  85%{transform:translateX(4px) rotate(2deg)}
  50%{transform:translateX(0) rotate(0)}
}
.notif-dot {
  position: absolute; top: -6px; right: -6px;
  width: 16px; height: 16px; border-radius: 50%;
  background: #ff3355; box-shadow: 0 0 10px #ff3355;
  animation: dotPulse 1.2s ease-in-out infinite;
}
@keyframes dotPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.5)} }
.phone-screen {
  width: 50px; height: 80px; border-radius: 8px;
  background: rgba(0,15,50,0.8);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
}
.phone-icon-text { font-size: 10px; color: rgba(0,200,255,0.6); text-align: center; line-height: 1.4; }
.phone-icon-text strong { font-size: 11px; color: #fff; display: block; }
.wait-title { font-size: 26px; font-weight: 700; color: #fff; text-align: center; }
.wait-sub { font-size: 13px; color: rgba(0,200,255,0.55); text-align: center; max-width: 420px; line-height: 1.7; }
.wait-host { color: #00dd88; font-weight: 600; }
.wait-visitor { color: #00aaff; font-weight: 600; }
.sms-preview {
  background: rgba(0,50,100,0.2); border: 1px solid rgba(0,140,255,0.2);
  border-radius: 14px; padding: 16px 22px;
  max-width: 440px; width: 100%;
}
.sms-from { font-size: 10px; color: rgba(0,180,255,0.4); letter-spacing: 1px; margin-bottom: 8px; }
.sms-body { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.8; }
.sms-link { color: #4488ff; font-size: 12px; }
.hl { color: #00dd99; font-weight: 600; }
.wait-timer { display: flex; align-items: center; gap: 10px; font-size: 13px; color: rgba(255,255,255,0.35); }
.wait-timer-num { color: #00aaff; font-weight: 700; font-size: 16px; }
.skip-btn {
  background: rgba(0,80,160,0.2); border: 1px solid rgba(0,150,255,0.2);
  border-radius: 50px; padding: 10px 22px;
  color: rgba(0,200,255,0.6); font-size: 13px;
  cursor: pointer; font-family: inherit; transition: all 0.2s;
}
.skip-btn:hover { background: rgba(0,100,180,0.3); color: rgba(0,200,255,1); }
.bottom-tip {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: rgba(0,200,255,0.3); letter-spacing: 1px; z-index: 20;
}
</style>
</head>
<body>

<div class="screen-wrapper">
  <div class="screen-bezel">
    <div class="camera-dot"></div>
    <div class="screen">

      <div class="step-badge">步骤 4/6 · 等待审批</div>

      <div class="status-bar">
        <span></span>
        <div class="status-time" id="clockDisplay">16:00</div>
      </div>

      <div class="top-banner">⏳ 登记已提交 · 等待审批</div>

      <div class="wait-area">
        <div class="phone-shake-wrap">
          <div class="phone-icon">
            <div class="notif-dot"></div>
            <div class="phone-screen">
              <span style="font-size:20px">📩</span>
              <div class="phone-icon-text"><strong>审批通知</strong></div>
              <div class="phone-icon-text">请及时处理</div>
            </div>
          </div>
        </div>

        <div class="wait-title">等待被访者审批中</div>
        <div class="wait-sub">
          已向 <span class="wait-host">李四</span> 发送短信审批通知<br>
          请 <span class="wait-visitor">张三</span> 稍作等候
        </div>

        <div class="sms-preview">
          <div class="sms-from">📱 系统短信通知（预览）</div>
          <div class="sms-body">
            【前海数智大厦】您有新访客申请：<br>
            访客 <span class="hl">张三</span> 因
            <span class="hl">商务洽谈</span> 申请来访，<br>
            请点击链接完成审批：<br>
            <span class="sms-link">https://visit.qianhai.com/apr/xxx</span>
          </div>
        </div>

        <div class="wait-timer">
          已等待：<span class="wait-timer-num">00:32</span>
        </div>

        <button class="skip-btn" onclick="parent.showStep && parent.showStep(5)">
          👉 模拟审批通过（演示用）
        </button>
      </div>

      <div class="bottom-tip">手机震动+通知 · 短信审批链接 → 点击底部圆点切换页面</div>

    </div>
  </div>
</div>

<script>
function updateClock() {
  const now = new Date();
  document.getElementById('clockDisplay').textContent =
    String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
}
updateClock();
setInterval(updateClock, 10000);
</script>
</body>
</html>
