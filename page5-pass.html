<meta charset="UTF-8">

<title>步骤5 · 通行二维码</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, #0d1a30 0%, #050a14 100%);
  display: flex; justify-content: center; align-items: center;
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.screen-wrapper { position: relative; width: 960px; height: 600px; }
.screen-bezel {
  position: absolute; inset: 0; border-radius: 24px;
  background: linear-gradient(145deg, #22263a, #16192a);
  box-shadow: 0 0 0 3px #2e3248, 0 0 80px rgba(0,170,255,0.15), 0 40px 100px rgba(0,0,0,0.9);
  padding: 14px;
}
.camera-dot {
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  width: 7px; height: 7px; border-radius: 50%; background: #00e5ff; box-shadow: 0 0 8px #00e5ff;
  animation: camBlink 3s infinite; z-index: 50;
}
@keyframes camBlink { 0%,92%,100%{opacity:1} 96%{opacity:0.1} }
.screen {
  width: 100%; height: 100%; border-radius: 18px; overflow: hidden; position: relative;
  background: linear-gradient(180deg, #111830 0%, #0a0e20 100%);
  display: flex; flex-direction: column;
}
.status-bar {
  position: absolute; top: 12px; left: 20px; right: 20px;
  display: flex; justify-content: space-between; align-items: center; z-index: 20;
}
.status-time { font-size: 12px; color: rgba(255,255,255,0.3); font-variant-numeric: tabular-nums; }
.step-badge {
  position: absolute; top: 12px; left: 20px;
  background: rgba(0,80,160,0.25); border: 1px solid rgba(0,130,255,0.2);
  border-radius: 50px; padding: 5px 14px;
  font-size: 11px; color: rgba(0,200,255,0.5); z-index: 20; letter-spacing: 1px;
}
.top-banner {
  background: rgba(0,100,200,0.12); border-bottom: 1px solid rgba(0,140,255,0.15);
  padding: 10px 20px; font-size: 12px; color: rgba(0,200,255,0.5);
  letter-spacing: 1px; text-align: center; margin-top: 36px;
}
.pass-area {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px; gap: 14px;
}
.pass-badge {
  background: linear-gradient(135deg, rgba(0,200,80,0.15), rgba(0,150,60,0.1));
  border: 1px solid rgba(0,200,80,0.3); border-radius: 50px; padding: 9px 26px;
  color: #00dd66; font-size: 14px; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.pass-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #00dd66; box-shadow: 0 0 8px #00dd66;
  animation: dotPulse2 1.5s ease-in-out infinite;
}
@keyframes dotPulse2 { 0%,100%{opacity:1} 50%{opacity:0.3} }
.qr-frame {
  background: #fff; border-radius: 18px; padding: 14px; position: relative; overflow: hidden;
  box-shadow: 0 0 40px rgba(0,200,80,0.2);
}
.scan-line {
  position: absolute; left: 14px; right: 14px; height: 2px;
  background: linear-gradient(90deg, transparent, #00ff88, transparent);
  animation: scanMove 2s ease-in-out infinite;
}
@keyframes scanMove {
  0%{top:14px;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:calc(100% - 14px);opacity:0}
}
.qr-svg { display: block; }
.pass-info { text-align: center; }
.pass-name { font-size: 22px; font-weight: 700; color: #fff; }
.pass-meta { font-size: 13px; color: rgba(0,200,255,0.6); margin-top: 4px; }
.pass-meta span { color: rgba(0,220,150,0.85); font-weight: 600; }
.pass-timer {
  background: rgba(255,160,0,0.08); border: 1px solid rgba(255,160,0,0.2);
  border-radius: 10px; padding: 10px 24px; font-size: 14px; color: rgba(255,180,0,0.85);
  display: flex; align-items: center; gap: 8px;
}
.pass-timer strong { font-size: 18px; font-weight: 700; color: #ffaa00; }
.pass-note {
  font-size: 12px; color: rgba(255,255,255,0.25);
  text-align: center; max-width: 320px; line-height: 1.7;
}
.restart-btn {
  background: rgba(0,80,160,0.2); border: 1px solid rgba(0,150,255,0.2);
  border-radius: 50px; padding: 11px 28px;
  color: rgba(0,200,255,0.7); font-size: 14px;
  cursor: pointer; font-family: inherit; transition: all 0.2s;
}
.restart-btn:hover { background: rgba(0,100,180,0.3); color: rgba(0,200,255,1); }
.bottom-tip {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: rgba(0,200,255,0.3); letter-spacing: 1px; z-index: 20;
}
</style>

<script>
function updateClock() {

  document.getElementById('clockDisplay').textContent =

}
updateClock();
setInterval(updateClock, 10000);
