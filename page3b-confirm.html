<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>步骤3b · 信息确认</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, #0d1a30 0%, #050a14 100%);
  display: flex; justify-content: center; align-items: center;
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.screen-wrapper { position: relative; width: 960px; height: 600px; }
.screen-bezel {
  position: absolute; inset: 0; border-radius: 24px;
  background: linear-gradient(145deg, #22263a, #16192a);
  box-shadow: 0 0 0 3px #2e3248, 0 0 80px rgba(0,170,255,0.15), 0 40px 100px rgba(0,0,0,0.9);
  padding: 14px;
}
.camera-dot {
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  width: 7px; height: 7px; border-radius: 50%; background: #00e5ff; box-shadow: 0 0 8px #00e5ff;
  animation: camBlink 3s infinite; z-index: 50;
}
@keyframes camBlink { 0%,92%,100%{opacity:1} 96%{opacity:0.1} }
.screen {
  width: 100%; height: 100%; border-radius: 18px; overflow: hidden; position: relative;
  background: linear-gradient(180deg, #111830 0%, #0a0e20 100%);
  display: flex; flex-direction: column;
}
.status-bar {
  position: absolute; top: 12px; left: 20px; right: 20px;
  display: flex; justify-content: space-between; align-items: center; z-index: 20;
}
.status-time { font-size: 12px; color: rgba(255,255,255,0.3); font-variant-numeric: tabular-nums; }
.step-badge {
  position: absolute; top: 12px; left: 20px;
  background: rgba(0,80,160,0.25); border: 1px solid rgba(0,130,255,0.2);
  border-radius: 50px; padding: 5px 14px;
  font-size: 11px; color: rgba(0,200,255,0.5); z-index: 20; letter-spacing: 1px;
}
.top-banner {
  background: rgba(0,100,200,0.12); border-bottom: 1px solid rgba(0,140,255,0.15);
  padding: 10px 20px; font-size: 12px; color: rgba(0,200,255,0.5);
  letter-spacing: 1px; text-align: center; margin-top: 36px;
}
.confirm-area {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px 60px; gap: 16px;
}
.robot-msg {
  background: rgba(0,40,90,0.22); border: 1px solid rgba(0,130,255,0.2);
  border-radius: 16px 16px 16px 4px;
  padding: 12px 18px; max-width: 420px;
  font-size: 14px; color: rgba(255,255,255,0.8); line-height: 1.6;
}
.robot-msg span { color: #00aaff; font-weight: 600; }
.form-card {
  background: rgba(0,40,90,0.22); border: 1px solid rgba(0,130,255,0.2);
  border-radius: 20px; padding: 22px 28px;
  max-width: 480px; width: 100%;
}
.form-title {
  font-size: 15px; color: rgba(255,255,255,0.6);
  letter-spacing: 1px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.form-title span { color: #00aaff; font-size: 18px; }
.form-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid rgba(0,100,200,0.15);
}
.form-row:last-child { border-bottom: none; }
.form-label {
  font-size: 12px; color: rgba(255,255,255,0.35);
  display: flex; align-items: center; gap: 6px;
}
.form-value {
  font-size: 14px; color: #fff; font-weight: 500;
  display: flex; align-items: center; gap: 8px;
}
.edit-btn {
  width: 24px; height: 24px; border-radius: 50%;
  background: rgba(0,120,200,0.2); border: 1px solid rgba(0,150,255,0.3);
  color: rgba(0,180,255,0.6); font-size: 11px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; font-family: inherit;
}
.edit-btn:hover { background: rgba(0,120,200,0.4); color: #00aaff; }
.btn-row {
  display: flex; gap: 12px; max-width: 480px; width: 100%;
}
.btn-back {
  flex: 1; padding: 14px;
  background: rgba(0,60,120,0.25); border: 1px solid rgba(0,120,255,0.25);
  border-radius: 50px; color: rgba(255,255,255,0.6);
  font-size: 15px; font-family: inherit; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all 0.22s;
}
.btn-back:hover { background: rgba(0,80,140,0.35); border-color: rgba(0,150,255,0.4); }
.btn-submit {
  flex: 2; padding: 14px;
  background: linear-gradient(135deg, #00aa55, #00cc66);
  border: none; border-radius: 50px; color: #fff;
  font-size: 15px; font-family: inherit; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 16px rgba(0,180,80,0.35);
  transition: all 0.22s; font-weight: 600;
}
.btn-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,180,80,0.5);
}
.edit-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: none; align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(4px);
}
.edit-modal.active { display: flex; }
.modal-box {
  background: linear-gradient(180deg, #1a2040, #141830);
  border: 1px solid rgba(0,150,255,0.3);
  border-radius: 20px; padding: 24px 28px;
  max-width: 400px; width: 90%;
}
.modal-title {
  font-size: 16px; color: #fff; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.modal-input {
  width: 100%; background: rgba(0,30,70,0.4);
  border: 1px solid rgba(0,130,255,0.3); border-radius: 12px;
  padding: 12px 16px; color: #fff; font-size: 14px;
  font-family: inherit; outline: none; margin-bottom: 16px;
}
.modal-input:focus { border-color: #00aaff; }
.modal-btns { display: flex; gap: 10px; }
.modal-btn {
  flex: 1; padding: 10px; border-radius: 50px;
  font-size: 14px; font-family: inherit; cursor: pointer;
  transition: all 0.2s;
}
.modal-cancel {
  background: rgba(60,70,100,0.3); border: 1px solid rgba(100,120,180,0.3);
  color: rgba(255,255,255,0.6);
}
.modal-cancel:hover { background: rgba(60,70,100,0.5); }
.modal-confirm {
  background: linear-gradient(135deg, #0066ff, #0099ff);
  border: none; color: #fff;
}
.modal-confirm:hover { opacity: 0.9; }
.bottom-tip {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: rgba(0,200,255,0.3); letter-spacing: 1px; z-index: 20;
}
</style>
</head>
<body>

<div class="screen-wrapper">
  <div class="screen-bezel">
    <div class="camera-dot"></div>
    <div class="screen">

      <div class="step-badge">步骤 3/6 · 信息确认</div>

      <div class="status-bar">
        <span></span>
        <div class="status-time" id="clockDisplay">16:00</div>
      </div>

      <div class="top-banner">📋 请核对您的登记信息</div>

      <div class="confirm-area">

        <div class="robot-msg">
          您好 <span>张三</span>，请核对以下信息<br>
          如有误请点击 <span>✏️</span> 修改，确认无误后提交登记
        </div>

        <div class="form-card">
          <div class="form-title">
            <span>📝</span> 访客登记信息
          </div>

          <div class="form-row">
            <div class="form-label">👤 访客姓名</div>
            <div class="form-value">
              张三
              <button class="edit-btn" onclick="openEdit('visitorName', '访客姓名', '张三')">✏️</button>
            </div>
          </div>

          <div class="form-row">
            <div class="form-label">📱 访客手机</div>
            <div class="form-value">
              138****8888
              <button class="edit-btn" onclick="openEdit('visitorPhone', '访客手机', '13812348888')">✏️</button>
            </div>
          </div>

          <div class="form-row">
            <div class="form-label">👤 被访人手机</div>
            <div class="form-value">
              139****6666
              <button class="edit-btn" onclick="openEdit('hostPhone', '被访人手机', '13912346666')">✏️</button>
            </div>
          </div>

          <div class="form-row">
            <div class="form-label">📍 访问地点</div>
            <div class="form-value">
              A栋 12层 会议室
              <button class="edit-btn" onclick="openEdit('location', '访问地点', 'A栋 12层 会议室')">✏️</button>
            </div>
          </div>

          <div class="form-row">
            <div class="form-label">📅 来访事由</div>
            <div class="form-value">
              商务洽谈
              <button class="edit-btn" onclick="openEdit('purpose', '来访事由', '商务洽谈')">✏️</button>
            </div>
          </div>

        </div>

        <div class="btn-row">
          <button class="btn-back" onclick="history.back()">
            ← 返回修改
          </button>
          <button class="btn-submit" onclick="submitForm()">
            ✓ 确认提交登记
          </button>
        </div>

      </div>

      <div class="bottom-tip">核对信息 · 修改有误项 · 确认提交 → 点击底部圆点切换页面</div>

    </div>
  </div>
</div>

<!-- 编辑弹窗 -->
<div class="edit-modal" id="editModal">
  <div class="modal-box">
    <div class="modal-title">
      <span>✏️</span> 修改 <span id="editFieldName"></span>
    </div>
    <input type="text" class="modal-input" id="editInput" />
    <div class="modal-btns">
      <button class="modal-btn modal-cancel" onclick="closeEdit()">取消</button>
      <button class="modal-btn modal-confirm" onclick="confirmEdit()">确认修改</button>
    </div>
  </div>
</div>

<script>
let currentField = null;

function updateClock() {
  const now = new Date();
  document.getElementById('clockDisplay').textContent =
    String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
}
updateClock();
setInterval(updateClock, 10000);

function openEdit(field, name, currentValue) {
  currentField = field;
  document.getElementById('editFieldName').textContent = name;
  document.getElementById('editInput').value = currentValue;
  document.getElementById('editModal').classList.add('active');
  document.getElementById('editInput').focus();
}

function closeEdit() {
  document.getElementById('editModal').classList.remove('active');
}

function confirmEdit() {
  const newValue = document.getElementById('editInput').value.trim();
  if (!newValue) {
    alert('请输入内容');
    return;
  }
  // 实际项目中这里应该更新数据
  closeEdit();
}

function submitForm() {
  // 实际项目中这里提交表单
  // 跳转到提交成功页
  if (parent.showStep) {
    parent.showStep(4);
  } else {
    window.location.href = 'page4-submit.html';
  }
}
</script>
</body>
</html>
